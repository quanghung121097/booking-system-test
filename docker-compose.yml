version: '3.9'

services:

  # ── MySQL ───────────────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: booking_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-secret}
      MYSQL_DATABASE: ${DB_DATABASE:-booking_db}
      MYSQL_USER: ${DB_USERNAME:-booking_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-booking_pass}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-secret}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - booking-net

  # ── PHP-FPM (Laravel) ───────────────────────────────────────────────────────
  php:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: booking_php
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./backend:/var/www/html
      - ./backend/.env:/var/www/html/.env
    environment:
      APP_ENV: local
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-booking_db}
      DB_USERNAME: ${DB_USERNAME:-booking_user}
      DB_PASSWORD: ${DB_PASSWORD:-booking_pass}
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - booking-net

  # ── Nginx (reverse proxy) ───────────────────────────────────────────────────
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: booking_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./backend:/var/www/html:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      - php
      - frontend
    networks:
      - booking-net

  # ── React (Vite dev server) ─────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: booking_frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      VITE_API_URL: http://localhost:8080/api
    networks:
      - booking-net

volumes:
  mysql_data:

networks:
  booking-net:
    driver: bridge
